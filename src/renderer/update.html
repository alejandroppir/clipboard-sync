<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Actualizando...</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #141414;
        color: #e0e0e0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        user-select: none;
        -webkit-font-smoothing: antialiased;
      }

      .logo {
        font-size: 36px;
        margin-bottom: 10px;
        animation: pop 0.3s ease-out;
      }

      .title {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.06em;
        color: #e0e0e0;
        margin-bottom: 6px;
        animation: pop 0.3s ease-out 0.05s both;
      }

      .subtitle {
        font-size: 11px;
        color: #666;
        margin-bottom: 22px;
        animation: pop 0.3s ease-out 0.1s both;
      }

      .dots {
        display: flex;
        gap: 7px;
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #22c55e;
        animation: bounce 1.1s ease-in-out infinite;
      }

      .dot:nth-child(2) {
        animation-delay: 0.18s;
      }
      .dot:nth-child(3) {
        animation-delay: 0.36s;
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          opacity: 0.25;
          transform: scale(0.75);
        }
        40% {
          opacity: 1;
          transform: scale(1.1);
        }
      }

      @keyframes pop {
        from {
          opacity: 0;
          transform: scale(0.9) translateY(4px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="logo">📋</div>
    <div class="title">CLIPBOARD SYNC</div>
    <div class="subtitle">Actualizando, por favor espera...</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </body>
</html>
