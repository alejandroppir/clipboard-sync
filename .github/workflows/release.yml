name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.3 — without the "v" prefix)'
        required: true
        type: string
      appName:
        description: 'Nombre de la aplicación (ej: Clipboard Sync, Dev Utils...)'
        required: false
        default: 'Clipboard Sync'
        type: string

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Bump version in package.json ────────────────────────────────────────
      - name: Set version in package.json
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version --allow-same-version

      # ── Create and push tag ─────────────────────────────────────────────────
      - name: Create and push tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"

      # ── Node.js setup ───────────────────────────────────────────────────────
      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      # ── Build TypeScript ────────────────────────────────────────────────────
      - name: Build TypeScript
        run: npm run build

      # ── Package with electron-builder ───────────────────────────────────────
      # electron-builder genera ClipboardSync.exe + latest.yml + SHA-512 automáticamente
      - name: Package Electron app
        run: npx electron-builder --win portable --publish always --config.productName="${{ github.event.inputs.appName }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
